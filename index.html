<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <style>
        /* Reseteo básico de márgenes */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            /* Fondo ligeramente crudo para una estética más orgánica y limpia */
            background-color: #f7f7f5; 
            color: #1a1a1a;
            /* Tipografía de sistema, técnica y de alta fidelidad */
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            
            /* Centrado absoluto en pantalla */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .mensaje-diario {
            max-width: 400px;
            width: 100%;
        }

        /* Estilo del texto principal */
        p {
            font-size: 1.35rem;
            line-height: 1.4;
            font-weight: 400;
            letter-spacing: -0.02em; 
        }

        /* Reglas para cuando decidas poner imágenes */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 2px; /* Corte limpio, nada de bordes redondeados infantiles */
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="mensaje-diario">
        
        <p>Buen viaje. Hoy empezamos.</p>
        </div>
</body>
</html>
